name: RAG Fullstack CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: rag-fullstack-docker-aws
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: i-0f790c856f47094cb

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-docker
    runs-on: ubuntu-latest
    name: Deploy to AWS EC2
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance public IP
        id: get-ip
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ env.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "EC2 Instance IP: $EC2_IP"

      - name: Deploy Docker container to EC2
        env:
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        run: |
          # Use AWS Systems Manager to run commands on EC2
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --region "$AWS_REGION" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "docker pull $DOCKER_IMAGE || true",
              "docker stop rag-fullstack || true",
              "docker rm rag-fullstack || true",
              "docker run -d --name rag-fullstack -p 8000:8000 -p 8501:8501 --restart unless-stopped $DOCKER_IMAGE",
              "sleep 5",
              "docker ps | grep rag-fullstack"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for command to complete
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --instance-id "$EC2_INSTANCE_ID" \
              --command-id "$COMMAND_ID" \
              --region "$AWS_REGION" \
              --query 'Status' \
              --output text)

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful"
              aws ssm get-command-invocation \
                --instance-id "$EC2_INSTANCE_ID" \
                --command-id "$COMMAND_ID" \
                --region "$AWS_REGION" \
                --query 'StandardOutputContent' \
                --output text
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "Deployment failed"
              aws ssm get-command-invocation \
                --instance-id "$EC2_INSTANCE_ID" \
                --command-id "$COMMAND_ID" \
                --region "$AWS_REGION" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi

            echo "Waiting... ($i/30) Status: $STATUS"
            sleep 2
          done

          echo "Command timeout"
          exit 1

      - name: Verify API is responsive
        env:
          EC2_IP: ${{ steps.get-ip.outputs.ec2_ip }}
        run: |
          echo "Waiting for API to be ready..."
          for i in {1..30}; do
            if curl -s http://${{ steps.get-ip.outputs.ec2_ip }}:8000/docs > /dev/null; then
              echo "✓ API is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "✗ API failed to respond"
          exit 1

      - name: Create deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✓ Deployment successful"
            echo "API: http://${{ steps.get-ip.outputs.ec2_ip }}:8000"
            echo "Frontend: http://${{ steps.get-ip.outputs.ec2_ip }}:8501"
          else
            echo "✗ Deployment failed"
            exit 1
          fi
